<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Video Editor</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>Image to Video Editor</h1>
    </header>
    
    <main>
        <div class="editor-container">
            <div class="tools-panel">
                <h2>Tools</h2>
                <div class="tool-group">
                    <button id="upload-btn" class="tool-btn"><i class="fas fa-upload"></i> Upload Images</button>
                    <input type="file" id="image-upload" accept="image/*" multiple style="display: none;">
                </div>
                <div class="tool-group">
                    <h3>Transitions</h3>
                    <button class="tool-btn transition-btn" data-transition="fade">Fade</button>
                    <button class="tool-btn transition-btn" data-transition="slide">Slide</button>
                    <button class="tool-btn transition-btn" data-transition="zoom">Zoom</button>
                </div>
                <div class="tool-group">
                    <h3>Duration</h3>
                    <div class="duration-control">
                        <label for="slide-duration">Slide Duration (seconds):</label>
                        <input type="number" id="slide-duration" min="0.5" max="10" step="0.5" value="2">
                    </div>
                    <div class="duration-control">
                        <label for="transition-duration">Transition Duration (seconds):</label>
                        <input type="number" id="transition-duration" min="0.1" max="3" step="0.1" value="0.5">
                    </div>
                </div>
            </div>
            
            <div class="preview-panel">
                <h2>Preview</h2>
                <div class="preview-container">
                    <div id="preview-display"></div>
                    <div class="preview-controls">
                        <button id="play-btn" class="control-btn"><i class="fas fa-play"></i></button>
                        <button id="pause-btn" class="control-btn"><i class="fas fa-pause"></i></button>
                        <button id="stop-btn" class="control-btn"><i class="fas fa-stop"></i></button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="timeline-container">
            <h2>Timeline</h2>
            <div id="timeline" class="timeline">
                <div class="timeline-track"></div>
            </div>
            <div class="export-controls">
                <button id="export-btn" class="primary-btn"><i class="fas fa-file-export"></i> Export Video</button>
            </div>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2023 Image to Video Editor</p>
    </footer>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg.js/0.10.0/ffmpeg.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sortablejs/1.14.0/Sortable.min.js"></script>
    
    <!-- App Scripts -->
    <script src="js/app.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/export.js"></script>
</body>
</html>
